name: Build Windows EXE

on:
  workflow_dispatch:
  push:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 方案A：更稳的目录模式（推荐先用这个）
      - name: Build (onedir, windowed)
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name --onefile ImageLabeler app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageLabeler-windows
          path: dist/
